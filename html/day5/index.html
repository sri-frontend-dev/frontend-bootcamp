<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page (Semantic Version)</title>
</head>
<body>
    <header>
        <h1>Website title</h1>
    </header>
    
    <nav>
        <a href="#home">Home</a> |
        <a href="#about">About</a> |
        <a href="#form">Register</a> 
    </nav>

    
    <main>
        <section id="about">
            <h2>About Me</h2>
            <p>I am a beginner frontend developer learning HTML, CSS, and JavaScript.</p>
        </section>

        <section id="form">
            <h2>Registration Form</h2>

       <form>
      
              <label for="name">Name</label><br>
              <input type="text" placeholder="Enter name" id="name" name="name" required><br><br>
              
              <label for="email">Email</label><br>
              <input type="email" placeholder="Enter email" id="email" name="email" required><br><br>
              
              <label for="password">Password</label><br>
              <input type="password" placeholder="Enter password" id="password" name="password" minlength="6" required><br><br>
              
              <label for="comfirmPassword">Confirm Password</label><br>
              <input type="password" placeholder="Enter password" id="comfirmPassword" name="comfirmPassword" required><br><br>
              
              <button type="submit">Submit</button>
       </form>

        </section>
    </main>

    <footer>
        <p>© 2026 Sri. All rights reserved.</p>
    </footer>

</body>
</html>
