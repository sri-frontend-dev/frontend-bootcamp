<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
</head>
<body>
    <h2>Registration From</h2>

    <form>
      
      <label for="name">Name</label><br>
      <input type="text" placeholder="Enter name" id="name" required><br><br>
      
      <label for="email">Email</label><br>
      <input type="email" placeholder="Enter email" id="email" required><br><br>
      
      <label for="password">Password</label><br>
      <input type="password" placeholder="Enter password" id="password" minlength="6" required><br><br>
      
      <label for="comfirmpassword">Confirm Password</label><br>
      <input type="password" placeholder="Enter password" id="comfirmpassword" required><br><br>
      
      <button type="submit">Submit</button>
    </form>
</body>
</html>
