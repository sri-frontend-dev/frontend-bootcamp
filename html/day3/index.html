<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <h2>My Weekly Schedule Table</h2>
    <table border="1" cellpadding="10">
        <tr>
          <th>Day</th>
          <th>Activity</th>
          <th>Time</th>   
        </tr>

        <tr>
            <td>Monday</td>
            <td>Coding</td>
            <td>2 hr</td>
        </tr>

        <tr>
            <td>Tuesday</td>
            <td>Practice</td>
            <td>2 hr</td>
        </tr>

        <tr>
            <td>Wednesday</td>
            <td>Mini challange</td>
            <td>2 hr</td>
        </tr>

        <tr>
            <td>Thursday</td>
            <td>Revision</td>
            <td>2 hr</td>
        </tr>

        <tr>
            <td>Friday</td>
            <td>Small task</td>
            <td>2 hr</td>
        </tr>

        <tr>
            <td>Saturday</td>
            <td>Project</td>
            <td>2 hr</td>
        </tr>
    </table>
</body>
</html>
